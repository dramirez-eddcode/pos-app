appId: mx.eddcode.farmaciasms.pos
productName: Farmacias MS POS
directories:
  buildResources: resources
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - '**/*.{node,dll}'
# Copia scripts auxiliares (impresión RAW) a <install>/resources/scripts/
# que es donde los busca el proceso principal en producción (process.resourcesPath).
extraResources:
  - from: resources/scripts
    to: scripts
win:
  executableName: farmacias-ms-pos
  target:
    - nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName} v${version}
  uninstallDisplayName: ${productName} v${version}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: generic
  url: https://example.com/auto-updates
